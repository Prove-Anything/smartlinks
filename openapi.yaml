openapi: "3.0.3"
info:
  title: Smartlinks API
  version: "1.0.0"
  description: "REST API for the Smartlinks platform.\n\nAdmin endpoints (`/admin/...`) require a Bearer token via the `Authorization` header.\nPublic endpoints (`/public/...`) are unauthenticated unless otherwise noted.\nAuthKit endpoints (`/authkit/...`) are public.\n\nSet the global `security` to `bearerAuth` and override individual operations with `security: []` for public routes."
servers:
  - url: "https://smartlinks.app/api/v1"
    description: Production
tags:
  - name: responses
  - name: completions
  - name: models
  - name: rag
  - name: sessions
  - name: podcast
  - name: tts
  - name: publicClient
  - name: voice
  - name: userAppData
  - name: cases
  - name: threads
  - name: records
  - name: asset
  - name: async
  - name: attestation
  - name: attestations
  - name: auth
  - name: authKit
  - name: batch
  - name: broadcasts
  - name: collection
  - name: comms
  - name: config
  - name: contact
  - name: containers
  - name: crate
  - name: facets
  - name: form
  - name: interactions
  - name: jobs
  - name: journeys
  - name: journeysAnalytics
  - name: location
  - name: loyalty
  - name: nfc
  - name: order
  - name: product
  - name: products
  - name: proof
  - name: qr
  - name: realtime
  - name: segments
  - name: tags
  - name: template
  - name: translations
  - name: variant
security:
  - bearerAuth: []
paths:
  /admin/auth/requestJWT:
    post:
      tags:
        - auth
      summary: Requests an admin JWT for the current user and a specific collection Returns JWT if valid.
      operationId: auth_requestAdminJWT
      security:
        - bearerAuth: []
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: string
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
  /admin/collection:
    post:
      tags:
        - collection
      summary: Create a new collection (admin only).
      operationId: collection_create
      security:
        - bearerAuth: []
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionCreateRequest"
  /admin/collection/product/batch/{batchId}:
    get:
      tags:
        - batch
      summary: Get a single batch by ID for a collection and product (admin only).
      operationId: batch_get
      security:
        - bearerAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
    put:
      tags:
        - batch
      summary: Update a batch for a collection and product (admin only).
      operationId: batch_update
      security:
        - bearerAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchUpdateRequest"
    delete:
      tags:
        - batch
      summary: Delete a batch for a collection and product (admin only).
      operationId: batch_remove
      security:
        - bearerAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
  /admin/collection/product/variant/{variantId}:
    get:
      tags:
        - variant
      summary: Get a single variant by ID for a collection and product (admin only).
      operationId: variant_get
      security:
        - bearerAuth: []
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariantResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
    put:
      tags:
        - variant
      summary: Update a variant for a collection and product (admin only).
      operationId: variant_update
      security:
        - bearerAuth: []
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariantResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VariantUpdateRequest"
    delete:
      tags:
        - variant
      summary: Delete a variant for a collection and product (admin only).
      operationId: variant_remove
      security:
        - bearerAuth: []
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
  /admin/collection/product/{productId}/batch:
    get:
      tags:
        - batch
      summary: List all batches for a collection and product (admin only).
      operationId: batch_list
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BatchResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
    post:
      tags:
        - batch
      summary: Create a new batch for a collection and product (admin only).
      operationId: batch_create
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateRequest"
  /admin/collection/product/{productId}/variant:
    get:
      tags:
        - variant
      summary: List all variants for a collection and product (admin only).
      operationId: variant_list
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VariantResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
    post:
      tags:
        - variant
      summary: Create a new variant for a collection and product (admin only).
      operationId: variant_create
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariantResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VariantCreateRequest"
  /admin/collection/{collectionId}:
    put:
      tags:
        - collection
      summary: Update a collection (admin only).
      operationId: collection_update
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionUpdateRequest"
    delete:
      tags:
        - collection
      summary: Delete a collection (admin only).
      operationId: collection_remove
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
  /admin/collection/{collectionId}/ai/configureAssistant:
    post:
      tags:
        - rag
      summary: Configure AI assistant behavior
      operationId: rag_configureAssistant
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigureAssistantResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigureAssistantRequest"
  /admin/collection/{collectionId}/ai/createCache:
    post:
      tags:
        - voice
      summary: Create or warm a cache for AI (admin)
      operationId: voice_createCache
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema: {}
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
  /admin/collection/{collectionId}/ai/generateImage:
    post:
      tags:
        - voice
      summary: Generate an image via AI (admin)
      operationId: voice_generateImage
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema: {}
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIGenerateImageRequest"
  /admin/collection/{collectionId}/ai/generatePodcast:
    post:
      tags:
        - podcast
      summary: Generate a NotebookLM-style conversational podcast from product documents
      operationId: podcast_generate
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratePodcastResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePodcastRequest"
  /admin/collection/{collectionId}/ai/indexDocument:
    post:
      tags:
        - rag
      summary: Index a document for RAG
      operationId: rag_indexDocument
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexDocumentResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexDocumentRequest"
  /admin/collection/{collectionId}/ai/models:
    get:
      tags:
        - models
      summary: List available AI models
      operationId: models_list
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
        - name: provider
          in: query
          required: false
          schema:
            type: string
            enum:
              - gemini
              - openai
        - name: capability
          in: query
          required: false
          schema:
            type: string
            enum:
              - text
              - vision
              - audio
              - code
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIModelListResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
  /admin/collection/{collectionId}/ai/models/{modelId}:
    get:
      tags:
        - models
      summary: Get specific model information
      operationId: models_get
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
        - name: modelId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIModel"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
  /admin/collection/{collectionId}/ai/podcast/{podcastId}:
    get:
      tags:
        - podcast
      summary: Get podcast generation status
      operationId: podcast_getStatus
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
        - name: podcastId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PodcastStatus"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
  /admin/collection/{collectionId}/ai/searchPhotos:
    post:
      tags:
        - voice
      summary: Search stock photos or similar via AI (admin)
      operationId: voice_searchPhotos
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AISearchPhotosPhoto"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AISearchPhotosRequest"
  /admin/collection/{collectionId}/ai/sessions/stats:
    get:
      tags:
        - sessions
      summary: Get session statistics
      operationId: sessions_stats
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStatistics"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
  /admin/collection/{collectionId}/ai/tts:
    post:
      tags:
        - tts
      summary: Generate text-to-speech audio
      operationId: tts_generate
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blob"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TTSRequest"
  /admin/collection/{collectionId}/ai/uploadFile:
    post:
      tags:
        - voice
      summary: Upload a file for AI usage (admin).
      operationId: voice_uploadFile
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema: {}
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
  /admin/collection/{collectionId}/ai/v1/chat/completions:
    post:
      tags:
        - completions
      summary: Create a chat completion (streaming or non-streaming)
      operationId: completions_create
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
  /admin/collection/{collectionId}/ai/v1/responses:
    post:
      tags:
        - responses
      summary: Create a Responses API request (streaming or non-streaming)
      operationId: responses_create
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponsesResult"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponsesRequest"
  /admin/collection/{collectionId}/assignSN/{codeId}:
    post:
      tags:
        - collection
      summary: Assign a value to a serial number for a collection (admin only).
      operationId: collection_assignSN
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
        - name: codeId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema: {}
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
  /admin/collection/{collectionId}/async/jobs:
    post:
      tags:
        - async
      summary: "Enqueue a background job for a collection POST /admin/collection/:collectionId/async/jobs (202)"
      operationId: async_enqueueAsyncJob
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnqueueAsyncJobResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnqueueAsyncJobRequest"
  /admin/collection/{collectionId}/async/jobs/{jobId}:
    get:
      tags:
        - async
      summary: "Get job status by ID (may return 404 if completed/removed) GET /admin/collection/:collectionId/async/jobs/:jobId"
      operationId: async_getAsyncJobStatus
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
  /admin/collection/{collectionId}/attestations:
    get:
      tags:
        - attestations
      summary: List attestations for a subject (admin).
      operationId: attestations_list
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
        - name: subjectType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AttestationSubjectType"
        - name: subjectId
          in: query
          required: false
          schema:
            type: string
        - name: attestationType
          in: query
          required: false
          schema:
            type: string
        - name: recordedAfter
          in: query
          required: false
          schema:
            type: string
        - name: recordedBefore
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: number
        - name: offset
          in: query
          required: false
          schema:
            type: number
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAttestationsResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
    post:
      tags:
        - attestations
      summary: Create a single attestation (admin).
      operationId: attestations_create
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attestation"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttestationInput"
  /admin/collection/{collectionId}/attestations/latest:
    get:
      tags:
        - attestations
      summary: "Latest snapshot — one record per `attestationType` (admin)."
      operationId: attestations_latest
      security:
        - bearerAuth: []
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
        - name: subjectType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AttestationSubjectType"
        - name: subjectId
          in: query
          required: false
          schema:
            type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttestationLatestResponse"
        400:
          description: Bad request
        401:
          description: Unauthorized
        404:
          description: Not found
  /admin/collection/{collectionId}/attestations/summary:
    get:
      tags:
        - attestations
      summary: Time-series summary of attestations (admin).
      operationId: attestations_summary
