components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token obtained from auth.login() or auth.verifyToken()
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for server-to-server calls
  schemas:
    ContentPart:
      type: object
      properties:
        type:
          type: string
          enum:
            - text
            - image_url
        text:
          type: string
        image_url:
          type: object
          additionalProperties: true
        url:
          type: string
        detail:
          type: string
          enum:
            - auto
            - low
            - high
      required:
        - type
        - url
    FunctionCall:
      type: object
      properties:
        name:
          type: string
        arguments:
          type: string
      required:
        - name
        - arguments
    ToolCall:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - function
        function:
          type: object
          additionalProperties: true
        name:
          type: string
        arguments:
          type: string
      required:
        - id
        - type
        - function
        - name
        - arguments
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum:
            - system
            - user
            - assistant
            - function
            - tool
        content:
          type: array
          items:
            type: object
            additionalProperties: true
        name:
          type: string
        function_call:
          $ref: "#/components/schemas/FunctionCall"
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
        tool_call_id:
          type: string
      required:
        - role
        - content
    ToolDefinition:
      type: object
      properties:
